<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveCount</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif;
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 24px;
    line-height: 1.8;
    color: #333;
    background: #fff1f4;
  }
  h1 { color: #e91e63; text-align: center; }
  .hero { text-align: center; padding: 32px 0; }
  .heart { font-size: 64px; color: #e91e63; }
  .tagline { font-size: 18px; color: #666; margin: 16px 0 32px; }
  .links { display: flex; flex-direction: column; gap: 12px; margin: 32px 0; }
  .links a {
    display: block;
    padding: 16px 24px;
    background: #fff;
    border-radius: 12px;
    text-decoration: none;
    color: #e91e63;
    font-weight: 600;
    text-align: center;
    box-shadow: 0 2px 8px rgba(233, 30, 99, 0.08);
    transition: transform 0.2s;
  }
  .links a:hover { transform: translateY(-2px); }
  footer {
    text-align: center;
    margin-top: 64px;
    color: #999;
    font-size: 14px;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #e0e0e0; }
    .links a { background: #2a2a2a; color: #ff8bab; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .tagline { color: #aaa; }
    footer { color: #666; }
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="heart">♡</div>
    <h1>LoveCount</h1>
    <p class="tagline">2人の大切な毎日をカウント</p>
  </div>

  <div class="links">
    <a href="./privacy.html">プライバシーポリシー</a>
    <a href="./terms.html">利用規約</a>
    <a href="./data-deletion.html">データ削除リクエスト</a>
  </div>

  <footer>
    &copy; 2026 Pocket Bloom Studio
  </footer>
</body>
</html>
